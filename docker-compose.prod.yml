version: '3.8'

services:
  web:
    build: .
    command: gunicorn Doble5.wsgi:application --bind 0.0.0.0:8000
    volumes:
      # Use a bind mount to map a host directory to the container's static/media folders.
      # This makes the files directly accessible to Nginx on the host.
      - /srv/doble5/static:/code/staticfiles
      - /srv/doble5/media:/code/mediafiles
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:14-alpine
    volumes:
      # The database can still use a named volume as it's self-contained.
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  # We only need a named volume for the database now.
  postgres_data:
