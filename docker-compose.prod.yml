version: '3.8'

services:
  web:
    build: .
    command: gunicorn Doble5.wsgi:application --bind 0.0.0.0:8000
    volumes:
      # This path must match the STATIC_ROOT and MEDIA_ROOT in your settings.py
      # which are inside the WORKDIR (/code) defined in the Dockerfile.
      - static_volume:/code/staticfiles
      - media_volume:/code/mediafiles
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:14-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  static_volume:
  media_volume:
