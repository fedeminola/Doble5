{% extends "core/base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">Abrir Caja ({{ tipo_caja }})</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <input type="hidden" name="tipo" value="{{ tipo_caja }}">
                        <input type="hidden" name="next" value="{{ next_url }}">

                        <div class="mb-3">
                            <label for="sede" class="form-label fw-bold">Sede</label>
                            <select name="sede" id="sede" class="form-select" required>
                                {% for sede in sedes %}
                                    <option value="{{ sede.id }}" {% if selected_sede and sede.id == selected_sede.id %}selected{% endif %}>
                                        {{ sede.nombre }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="monto_inicial" class="form-label fw-bold">Monto Inicial</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" name="monto_inicial" class="form-control" step="0.01" required autofocus>
                            </div>
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">Abrir Caja</button>
                            <a href="{{ next_url }}" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
